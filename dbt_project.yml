name: wonderla_analytics
version: "1.0.0"
config-version: 2

profile: default

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

models:
  wonderla_analytics:
    staging:
      +materialized: view
      +schema: staging

    intermediate:
      +materialized: view
      +schema: intermediate

    dimensions:
      +materialized: table
      +schema: dimensions

    facts:
      +materialized: table
      +schema: facts

    marts:
      +materialized: table
      +schema: marts